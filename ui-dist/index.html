<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Poke Radar</title>
  </head>
  <body>
    <main>
      <h1>Boot Poke Radar</h1>
      <p id="boot-status">Initialisation en cours...</p>
    </main>

    <script>
      const statusNode = document.getElementById("boot-status");

      function setStatus(message) {
        if (statusNode) {
          statusNode.textContent = message;
        }
      }

      async function runBootSequence() {
        const tauri = window.__TAURI_INTERNALS__;

        if (!tauri || typeof tauri.invoke !== "function") {
          throw new Error(
            "Runtime Tauri indisponible. Lancez l'application via Tauri (et non dans un navigateur seul)."
          );
        }

        await tauri.invoke("app_ready");
      }

      function extractBootErrorMessage(error) {
        if (error instanceof Error) {
          return error.message;
        }

        if (typeof error === "string" && error.trim().length > 0) {
          return error;
        }

        if (error && typeof error === "object") {
          const withMessage = /** @type {{ message?: unknown }} */ (error).message;
          if (typeof withMessage === "string" && withMessage.trim().length > 0) {
            return withMessage;
          }

          try {
            const serialized = JSON.stringify(error);
            if (serialized && serialized !== "{}") {
              return serialized;
            }
          } catch {
            // No-op: fallback message below.
          }
        }

        return "Impossible de terminer l'initialisation. Vérifiez les logs puis redémarrez l'application.";
      }

      void runBootSequence()
        .then(() => {
          setStatus("Application prête");
        })
        .catch((error) => {
          setStatus(extractBootErrorMessage(error));
        });
    </script>
  </body>
</html>
